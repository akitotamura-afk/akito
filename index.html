<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SES採用 媒体効果検証ダッシュボード</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif;background:#0a0e1a;color:#e2e8f0;line-height:1.6}
.wrap{max-width:1240px;margin:0 auto;padding:16px}
h1{font-size:1.4rem;text-align:center;margin-bottom:2px;background:linear-gradient(135deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#64748b;font-size:.8rem;margin-bottom:20px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.tab{padding:7px 16px;border-radius:99px;border:1px solid #1e293b;background:#0f172a;color:#94a3b8;cursor:pointer;font-size:.82rem;transition:.2s}
.tab:hover{border-color:#475569}.tab.active{background:#6366f1;color:#fff;border-color:#6366f1}
.section{display:none}.section.active{display:block}
.card{background:#111827;border:1px solid #1e293b;border-radius:14px;padding:20px;margin-bottom:14px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px;text-align:center}
.kpi-val{font-size:1.4rem;font-weight:800}.kpi-label{font-size:.68rem;color:#64748b;margin-top:2px}
table.media{width:100%;border-collapse:collapse;font-size:.82rem}
table.media th{text-align:left;padding:8px 6px;color:#64748b;border-bottom:2px solid #1e293b;font-weight:600;white-space:nowrap}
table.media td{padding:8px 6px;border-bottom:1px solid #0f172a;white-space:nowrap}
table.media tr:hover{background:#0f172a}
table.media .num{text-align:right;font-variant-numeric:tabular-nums}
.funnel{display:flex;flex-direction:column;gap:4px;margin:8px 0}
.funnel-step{display:flex;align-items:center;gap:10px}
.funnel-bar{height:26px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:.73rem;font-weight:600;color:#fff;min-width:30px;transition:width .6s}
.funnel-label{font-size:.78rem;color:#94a3b8;min-width:80px;text-align:right}
.funnel-rate{font-size:.7rem;color:#fbbf24;margin-left:6px;white-space:nowrap}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.chart-row{grid-template-columns:1fr}}
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.input-card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;position:relative}
.input-card h3{font-size:.9rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.input-row{display:flex;gap:8px;margin-bottom:5px;align-items:center}
.input-row label{font-size:.75rem;color:#94a3b8;min-width:100px}
.input-row input{background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:5px 8px;border-radius:6px;font-size:.85rem;width:90px;text-align:right}
.input-row input:focus{outline:none;border-color:#6366f1}
.input-row .unit{font-size:.72rem;color:#64748b;min-width:18px}
.month-select{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;padding:6px 12px;border-radius:8px;font-size:.8rem}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#818cf8}
.btn-secondary{background:#1e293b;color:#cbd5e1}.btn-secondary:hover{background:#334155}
.btn-sm{padding:5px 12px;font-size:.75rem;border:none;border-radius:6px;cursor:pointer}
.btn-danger{background:#7f1d1d;color:#fca5a5}.btn-danger:hover{background:#991b1b}
.btn-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.insight{border-radius:10px;padding:12px;margin:8px 0;font-size:.84rem}
.insight-good{background:#021a0a;border:1px solid #064e3b;color:#6ee7b7}
.insight-warn{background:#1a0f05;border:1px solid #78350f;color:#fbbf24}
.insight-info{background:#0c1425;border:1px solid #1e3a5f;color:#7dd3fc}
.insight strong{font-weight:700}
.legend{display:flex;gap:12px;margin:8px 0;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;color:#94a3b8}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sim-row{display:flex;gap:12px;align-items:center;margin:8px 0;flex-wrap:wrap}
.sim-slider{flex:1;min-width:120px;-webkit-appearance:none;height:6px;background:#1e293b;border-radius:99px;outline:none}
.sim-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#6366f1;cursor:pointer}
.sim-result{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-top:12px}
.sim-box{background:#0a0e1a;border-radius:8px;padding:10px;text-align:center}
.sim-val{font-size:1.2rem;font-weight:800}.sim-label{font-size:.68rem;color:#64748b;margin-top:2px}
/* Bottleneck actions */
.action-card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:10px}
.action-title{font-size:.9rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.action-list{list-style:none;padding:0}
.action-list li{padding:6px 0 6px 20px;position:relative;font-size:.82rem;color:#cbd5e1;border-left:2px solid #1e293b;margin-left:4px}
.action-list li::before{content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:#6366f1}
.action-impact{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;margin-left:6px}
.impact-high{background:#064e3b;color:#34d399}.impact-mid{background:#422006;color:#fbbf24}.impact-low{background:#1e293b;color:#94a3b8}
/* Add media modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#111827;border:1px solid #334155;border-radius:16px;padding:24px;width:340px;max-width:90vw}
.modal h3{font-size:1rem;margin-bottom:14px}
.modal .input-row{margin-bottom:8px}
.modal .input-row label{min-width:80px}
.modal .input-row input,.modal .input-row select{width:140px;background:#0a0e1a;border:1px solid #1e293b;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:.85rem}
.remove-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:#475569;cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px}
.remove-btn:hover{color:#f87171;background:#450a0a}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none}
/* Sim new media */
.sim-new-card{background:#0a0e1a;border:2px dashed #334155;border-radius:12px;padding:16px;margin-bottom:10px;position:relative}
.sim-new-card.active{border-color:#6366f1;border-style:solid}
.sim-new-card h4{font-size:.88rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sim-input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.sim-field{display:flex;align-items:center;gap:6px;font-size:.78rem}
.sim-field label{color:#94a3b8;min-width:90px}
.sim-field input{background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:4px 8px;border-radius:6px;font-size:.82rem;width:80px;text-align:right}
.sim-field input:focus{outline:none;border-color:#6366f1}
.sim-field .unit{color:#475569;font-size:.7rem;min-width:16px}
.sim-field select{background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:4px 8px;border-radius:6px;font-size:.82rem}
.sim-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #1e293b}
.sim-summary-item{text-align:center}
.sim-summary-val{font-size:1rem;font-weight:800}
.sim-summary-label{font-size:.62rem;color:#64748b}
.compare-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;margin-left:4px}
.compare-up{background:#064e3b;color:#34d399}
.compare-down{background:#450a0a;color:#f87171}
.template-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.template-chip{padding:5px 12px;border-radius:99px;border:1px solid #1e293b;background:#0f172a;color:#94a3b8;cursor:pointer;font-size:.75rem;transition:.2s}
.template-chip:hover{border-color:#6366f1;color:#e2e8f0}
</style>
</head>
<body>
<div class="wrap">
<h1>SES採用 媒体効果検証ダッシュボード</h1>
<p class="sub" id="subTitle"></p>

<div class="tabs">
  <div class="tab active" onclick="showTab('input')">データ入力</div>
  <div class="tab" onclick="showTab('overview')">全体サマリ</div>
  <div class="tab" onclick="showTab('funnel')">ファネル分析</div>
  <div class="tab" onclick="showTab('compare')">媒体比較</div>
  <div class="tab" onclick="showTab('bottleneck')">ボトルネック診断</div>
  <div class="tab" onclick="showTab('competitor')">競合分析</div>
  <div class="tab" onclick="showTab('trend')">月次トレンド</div>
  <div class="tab" onclick="showTab('simulate')">メディアプラン試算</div>
  <div class="tab" onclick="showTab('simpl')">採用PLシミュレーション</div>
</div>

<div class="section active" id="sec-input"><div id="inputArea"></div></div>
<div class="section" id="sec-overview"><div id="overviewArea"></div></div>
<div class="section" id="sec-funnel"><div id="funnelArea"></div></div>
<div class="section" id="sec-compare"><div id="compareArea"></div></div>
<div class="section" id="sec-bottleneck"><div id="bottleneckArea"></div></div>
<div class="section" id="sec-competitor"><div id="competitorArea"></div></div>
<div class="section" id="sec-trend"><div id="trendArea"></div></div>
<div class="section" id="sec-simulate"><div id="simArea"></div></div>
<div class="section" id="sec-simpl"><div id="simPLArea"></div></div>
<div id="modalContainer"></div>
</div>

<script>
// ===== CONFIG =====
const FIELDS = ['cost','apply','valid','interview','sales_start','hire','deal'];
const FIELD_NAMES = ['掲載費用','応募数','有効応募','面接実施数','営業開始数','入社数','成約数'];
const FIELD_UNITS = ['円','件','件','件','件','件','件'];
const PALETTE = ['#3b82f6','#f59e0b','#22c55e','#ec4899','#14b8a6','#f97316','#8b5cf6','#06b6d4','#e11d48','#84cc16','#6366f1','#fb923c'];
const STAGE_COLORS = ['#38bdf8','#818cf8','#a78bfa','#fbbf24','#fb923c','#34d399','#22c55e'];

// Preloaded real data from 応募スコア12月～2月 + 媒体費用.xlsx
// deal = 成約数（過去入社者の案件決定を含むためファネル外で管理）
const PRELOAD_DATA = {
  '2025-12': {
    month:'2025-12',
    mn:{cost:412500, apply:50, valid:20, interview:9,  sales_start:4, hire:0, deal:2},
    en:{cost:521400, apply:50, valid:20, interview:10, sales_start:4, hire:1, deal:0},
    tp:{cost:409444, apply:19, valid:4,  interview:2,  sales_start:2, hire:0, deal:1},
    dd:{cost:397833, apply:18, valid:8,  interview:0,  sales_start:0, hire:0, deal:2},
    hp:{cost:0,      apply:0,  valid:0,  interview:0,  sales_start:0, hire:0, deal:1}
  },
  '2026-01': {
    month:'2026-01',
    mn:{cost:412500, apply:41, valid:12, interview:7, sales_start:5, hire:0, deal:2},
    en:{cost:521400, apply:41, valid:12, interview:5, sales_start:5, hire:0, deal:1},
    tp:{cost:440000, apply:37, valid:4,  interview:2, sales_start:2, hire:0, deal:0},
    dd:{cost:397833, apply:21, valid:9,  interview:6, sales_start:6, hire:1, deal:0},
    hp:{cost:266667, apply:19, valid:4,  interview:4, sales_start:3, hire:0, deal:0}
  },
  '2026-02': {
    month:'2026-02',
    mn:{cost:412500, apply:40, valid:16, interview:8, sales_start:8, hire:0, deal:0},
    en:{cost:521400, apply:40, valid:16, interview:8, sales_start:8, hire:0, deal:0},
    tp:{cost:440000, apply:57, valid:14, interview:10,sales_start:6, hire:0, deal:1},
    dd:{cost:397833, apply:12, valid:4,  interview:4, sales_start:3, hire:0, deal:1},
    hp:{cost:266667, apply:67, valid:10, interview:7, sales_start:2, hire:0, deal:0}
  }
};

// Default media (Airワーク+Indeed = HP/Indeed)
const DEFAULT_MEDIA = [
  {id:'mn',name:'マイナビ転職',short:'マイナビ'},
  {id:'en',name:'エン転職',short:'エン'},
  {id:'tp',name:'type',short:'type'},
  {id:'dd',name:'doda',short:'doda'},
  {id:'hp',name:'HP/Indeed',short:'HP/Indeed'}
];

let mediaList = JSON.parse(localStorage.getItem('ses_media_list')||'null') || DEFAULT_MEDIA.map((m,i)=>({...m,color:PALETTE[i]}));
let allData = JSON.parse(localStorage.getItem('ses_media_data2')||'null') || {...PRELOAD_DATA};
// Merge PRELOAD_DATA costs into allData if localStorage has stale cost:0 values
Object.keys(PRELOAD_DATA).forEach(month=>{
  if(allData[month]){
    Object.keys(PRELOAD_DATA[month]).forEach(mid=>{
      if(mid==='month') return;
      if(allData[month][mid] && PRELOAD_DATA[month][mid] && allData[month][mid].cost===0 && PRELOAD_DATA[month][mid].cost>0){
        allData[month][mid].cost = PRELOAD_DATA[month][mid].cost;
      }
    });
  }
});
let currentData = null;

function saveMediaList(){ localStorage.setItem('ses_media_list', JSON.stringify(mediaList)); }
function yen(n){ return n>=10000?(n/10000).toFixed(1)+'万':n.toLocaleString(); }
function pct(a,b){ return b?(a/b*100).toFixed(1):'-'; }
function KEYS(){ return mediaList.map(m=>m.id); }
function getMedia(id){ return mediaList.find(m=>m.id===id); }
function updateSubtitle(){ document.getElementById('subTitle').textContent = mediaList.map(m=>m.short||m.name).join('・') + ' の採用パフォーマンスを一元管理'; }

// ===== INPUT =====
function renderInput(){
  updateSubtitle();
  let html = `<div class="card">
    <div class="card-title">月次データ入力</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <label style="font-size:.8rem;color:#94a3b8">対象月:</label>
      <select id="inputMonth" class="month-select" onchange="loadMonth()">`;
  for(let y=2026;y>=2025;y--) for(let m=12;m>=1;m--){
    const val=`${y}-${String(m).padStart(2,'0')}`;
    const sel=(y===2026&&m===3)?'selected':'';
    html+=`<option value="${val}" ${sel}>${y}年${m}月</option>`;
  }
  html+=`</select></div><div class="input-grid" id="mediaInputGrid">`;

  mediaList.forEach(media=>{
    html += renderMediaCard(media);
  });

  // Add media button
  html += `<div class="input-card" style="display:flex;align-items:center;justify-content:center;min-height:200px;border-style:dashed;cursor:pointer" onclick="showAddMediaModal()">
    <div style="text-align:center;color:#475569"><div style="font-size:2rem;margin-bottom:4px">+</div><div style="font-size:.82rem">媒体を追加</div></div>
  </div>`;

  html += `</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="analyze()">分析実行 →</button>
      <button class="btn btn-secondary" onclick="saveData()">データ保存</button>
      <button class="btn btn-secondary" onclick="exportCSV()">CSV出力</button>
    </div></div>`;

  document.getElementById('inputArea').innerHTML = html;
  loadMonth();
}

function renderMediaCard(media){
  let html = `<div class="input-card" id="card_${media.id}">
    <button class="remove-btn" title="この媒体を削除" onclick="removeMedia('${media.id}')">×</button>
    <h3><span class="legend-dot" style="background:${media.color}"></span> ${media.name}</h3>`;
  FIELDS.forEach((f,i)=>{
    const def = 0;
    html+=`<div class="input-row"><label>${FIELD_NAMES[i]}</label><input type="number" id="${media.id}_${f}" value="${def}" min="0" step="${f==='cost'?10000:1}"><span class="unit">${FIELD_UNITS[i]}</span></div>`;
  });
  return html + `</div>`;
}

function showAddMediaModal(){
  const nextColor = PALETTE[mediaList.length % PALETTE.length];
  document.getElementById('modalContainer').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal fade-in">
      <h3>媒体を追加</h3>
      <div class="input-row"><label>媒体名</label><input type="text" id="newMediaName" placeholder="例: Green"></div>
      <div class="input-row"><label>略称</label><input type="text" id="newMediaShort" placeholder="例: Green"></div>
      <div class="input-row"><label>カラー</label><input type="color" id="newMediaColor" value="${nextColor}" style="width:50px;padding:2px;height:32px"></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-primary" onclick="addMedia()">追加</button>
        <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      </div>
    </div>
  </div>`;
}

function closeModal(){ document.getElementById('modalContainer').innerHTML=''; }

function addMedia(){
  const name = document.getElementById('newMediaName').value.trim();
  const short = document.getElementById('newMediaShort').value.trim() || name;
  const color = document.getElementById('newMediaColor').value;
  if(!name){ alert('媒体名を入力してください'); return; }
  const id = 'custom_' + Date.now();
  mediaList.push({id, name, short, color});
  saveMediaList();
  closeModal();
  renderInput();
}

function removeMedia(id){
  if(mediaList.length <= 1){ alert('最低1つの媒体が必要です'); return; }
  if(!confirm(`${getMedia(id)?.name} を削除しますか？`)) return;
  mediaList = mediaList.filter(m=>m.id !== id);
  saveMediaList();
  renderInput();
}

function getInputData(){
  const get = id => parseInt(document.getElementById(id)?.value)||0;
  const d = { month: document.getElementById('inputMonth').value };
  mediaList.forEach(m => {
    d[m.id] = {};
    FIELDS.forEach(f => d[m.id][f] = get(`${m.id}_${f}`));
  });
  return d;
}

function loadMonth(){
  const month = document.getElementById('inputMonth')?.value;
  if(!month || !allData[month]) return;
  const d = allData[month];
  mediaList.forEach(m => {
    if(!d[m.id]) return;
    FIELDS.forEach(f => {
      const el = document.getElementById(`${m.id}_${f}`);
      if(el && d[m.id][f] !== undefined) el.value = d[m.id][f];
    });
  });
}

function saveData(){
  const d = getInputData();
  allData[d.month] = d;
  localStorage.setItem('ses_media_data2', JSON.stringify(allData));
  alert(d.month + ' のデータを保存しました');
}

function exportCSV(){
  const d = currentData || getInputData();
  let csv = '媒体,'+FIELD_NAMES.join(',')+'\n';
  mediaList.forEach(m => {
    csv += m.name + ',' + FIELDS.map(f=>d[m.id]?.[f]||0).join(',') + '\n';
  });
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`media_report_${d.month}.csv`; a.click();
}

// ===== ANALYZE =====
function analyze(){
  currentData = getInputData();
  renderOverview();
  renderFunnel();
  renderCompare();
  renderBottleneck();
  renderCompetitor();
  renderTrend();
  renderSimulate();
  renderSimPL();
  showTab('overview');
}

// ===== OVERVIEW =====
function renderOverview(){
  const d = currentData;
  const total = {};
  FIELDS.forEach(f => total[f] = 0);
  mediaList.forEach(m => FIELDS.forEach(f => total[f] += d[m.id]?.[f]||0));

  const cpaD = total.deal ? Math.round(total.cost/total.deal) : null;

  let html = `<div class="kpi-row fade-in">
    <div class="kpi"><div class="kpi-val" style="color:#38bdf8">${total.apply}</div><div class="kpi-label">応募数</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#818cf8">${total.valid}</div><div class="kpi-label">有効応募</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#fbbf24">${total.interview}</div><div class="kpi-label">面接実施</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#fb923c">${total.sales_start}</div><div class="kpi-label">営業開始</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#34d399">${total.hire}</div><div class="kpi-label">入社数</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#e879f9">${total.deal}</div><div class="kpi-label">成約数</div></div>

    <div class="kpi"><div class="kpi-val" style="color:#818cf8">${yen(total.cost)}円</div><div class="kpi-label">総費用</div></div>
  </div>`;

  const cpas = {};
  mediaList.forEach(m => { cpas[m.id] = d[m.id]?.deal ? d[m.id].cost/d[m.id].deal : Infinity; });
  const sorted = Object.entries(cpas).filter(e=>e[1]!==Infinity).sort((a,b)=>a[1]-b[1]);
  if(sorted.length) html += `<div class="insight insight-good"><strong>最もCPAが良い媒体: ${getMedia(sorted[0][0])?.name}</strong> — 成約1件あたり ${yen(Math.round(sorted[0][1]))}円</div>`;

  mediaList.forEach(m => {
    const vr = d[m.id]?.apply ? d[m.id].valid/d[m.id].apply*100 : null;
    if(vr !== null && vr < 30) html += `<div class="insight insight-warn"><strong>${m.name}: 有効応募率 ${vr.toFixed(1)}%</strong> — ターゲットとのミスマッチの可能性</div>`;
  });

  if(total.hire > 0 && total.deal < total.hire){
    html += `<div class="insight insight-warn"><strong>入社${total.hire}名中 成約${total.deal}名</strong> — 待機率${((1-total.deal/total.hire)*100).toFixed(0)}%</div>`;
  }

  // Cost chart
  html += `<div class="chart-row fade-in"><div class="card"><div class="card-title">費用配分</div>
    <div style="display:flex;gap:3px;margin:16px 0;height:30px;border-radius:8px;overflow:hidden">
    ${mediaList.map(m=>{const c=d[m.id]?.cost||0;return`<div style="flex:${Math.max(c,1)};background:${m.color};display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;min-width:0;overflow:hidden">${total.cost?(c/total.cost*100).toFixed(0)+'%':''}</div>`;}).join('')}

  </div>
  <div class="card"><div class="card-title">成約CPA比較</div>
    <div style="display:flex;gap:12px;justify-content:center;align-items:flex-end;height:120px;margin-top:16px;flex-wrap:wrap">
    ${(()=>{
      const cpas2=mediaList.map(m=>({m,cpa:d[m.id]?.deal?d[m.id].cost/d[m.id].deal:0}));
      const mx=Math.max(...cpas2.map(c=>c.cpa),1);
      return cpas2.map(c=>`<div style="text-align:center"><div style="font-size:.7rem;font-weight:700;color:${c.m.color};margin-bottom:3px">${c.cpa?yen(Math.round(c.cpa))+'円':'N/A'}</div><div style="width:40px;height:${mx?(c.cpa/mx*100):0}px;background:${c.m.color};border-radius:4px 4px 0 0"></div><div style="font-size:.65rem;color:#64748b;margin-top:4px">${c.m.short}</div></div>`).join('');
    })()}
    </div></div></div>`;

  document.getElementById('overviewArea').innerHTML = html;
}

// ===== FUNNEL =====
function renderFunnel(){
  const d = currentData;
  const stages = ['apply','valid','interview','sales_start','hire'];
  const stageNames = ['応募','有効応募','面接実施','営業開始','入社'];

  let html = '';
  mediaList.forEach(m => {
    const md = d[m.id]||{};
    const maxVal = Math.max(...stages.map(s=>md[s]||0),1);
    html += `<div class="card fade-in"><div class="card-title"><span class="dot" style="background:${m.color}"></span>${m.name}</div><div class="funnel">`;
    stages.forEach((s,i)=>{
      const val = md[s]||0;
      const w = Math.max((val/maxVal)*100,3);
      const prev = i>0?(md[stages[i-1]]||0):null;
      const rate = prev ? `← ${pct(val,prev)}%` : '';
      html += `<div class="funnel-step"><div class="funnel-label">${stageNames[i]}</div><div class="funnel-bar" style="width:${w}%;background:${STAGE_COLORS[i]}">${val}</div>${rate?`<div class="funnel-rate">${rate}</div>`:''}</div>`;
    });
    html += `</div></div>`;
  });

  // Conversion table
  html += `<div class="card fade-in"><div class="card-title">転換率比較</div><table class="media"><thead><tr><th>転換</th>${mediaList.map(m=>`<th style="color:${m.color}">${m.short}</th>`).join('')}<th>平均</th></tr></thead><tbody>`;
  const convs = [{n:'応募→有効応募',f:'apply',t:'valid'},{n:'有効応募→面接',f:'valid',t:'interview'},{n:'面接→営業開始',f:'interview',t:'sales_start'},{n:'営業開始→入社',f:'sales_start',t:'hire'},{n:'全体(応募→入社)',f:'apply',t:'hire'}];
  convs.forEach(c=>{
    const vals = mediaList.map(m=>{const md=d[m.id]||{};return md[c.f]?(md[c.t]/md[c.f]*100):0;});
    const mx = Math.max(...vals);
    html += `<tr><td>${c.n}</td>${vals.map((v,i)=>`<td class="num" ${v===mx&&v>0?'style="color:#34d399;font-weight:700"':''}>${v.toFixed(1)}%</td>`).join('')}<td class="num">${(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)}%</td></tr>`;
  });
  html += `</tbody></table></div>`;

  document.getElementById('funnelArea').innerHTML = html;
}

// ===== COMPARE =====
function renderCompare(){
  const d = currentData;
  const metrics = [
    {name:'応募数',key:'apply',fmt:v=>v+'件',better:'high'},
    {name:'有効応募率',calc:m=>m.apply?(m.valid/m.apply*100):0,fmt:v=>v.toFixed(1)+'%',better:'high'},
    {name:'有効応募数',key:'valid',fmt:v=>v+'件',better:'high'},
    {name:'面接実施数',key:'interview',fmt:v=>v+'件',better:'high'},
    {name:'面接→営業開始率',calc:m=>m.interview?(m.sales_start/m.interview*100):0,fmt:v=>v.toFixed(1)+'%',better:'high'},
    {name:'営業開始数',key:'sales_start',fmt:v=>v+'名',better:'high'},
    {name:'入社数',key:'hire',fmt:v=>v+'名',better:'high'},
    {name:'成約数',key:'deal',fmt:v=>v+'件',better:'high'},
  ];

  let html = `<div class="card fade-in"><div class="card-title">媒体スコアカード</div><table class="media"><thead><tr><th>指標</th>${mediaList.map(m=>`<th style="color:${m.color}">${m.short}</th>`).join('')}<th>最優秀</th></tr></thead><tbody>`;
  const scores = {}; mediaList.forEach(m=>scores[m.id]=0);

  metrics.forEach(met => {
    const vals = {};
    mediaList.forEach(m => { vals[m.id] = met.calc ? met.calc(d[m.id]||{}) : (d[m.id]?.[met.key]||0); });
    const valid = Object.entries(vals).filter(([,v])=>v!==null&&v!==0);
    let winK = '';
    if(valid.length > 0){
      if(met.better==='high') winK = valid.sort((a,b)=>(b[1]||0)-(a[1]||0))[0][0];
      else winK = valid.filter(e=>e[1]>0).sort((a,b)=>(a[1]||Infinity)-(b[1]||Infinity))[0]?.[0]||'';
    }
    if(winK) scores[winK]++;
    html += `<tr><td>${met.name}</td>${mediaList.map(m=>{const isW=m.id===winK&&valid.length>1;return`<td class="num" ${isW?'style="color:#34d399;font-weight:700"':''}>${met.fmt(vals[m.id])}</td>`;}).join('')}<td style="color:${winK?getMedia(winK)?.color:'#64748b'}">${winK?getMedia(winK)?.short:'-'}</td></tr>`;
  });
  html += `</tbody></table>`;
  const ss = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  html += `<div style="margin-top:12px;text-align:center;font-size:.85rem">${ss.map(([k,v])=>`<span style="color:${getMedia(k)?.color};font-weight:700;margin:0 8px">${getMedia(k)?.short} ${v}勝</span>`).join('')}</div></div>`;

  document.getElementById('compareArea').innerHTML = html;
}

    ];

      ...cs,

      toVal: md[cs.to]||0
    })).filter(r => r.fromVal > 0);

    // Find worst bottleneck
    const worst = rates.reduce((min,r) => (r.rate !== null && r.rate < min.rate) ? r : min, {rate:Infinity});
    // Check low volume
    const isLowVolume = (md.apply||0) < 5;

    html += `<div class="card fade-in">
      <div class="card-title"><span class="dot" style="background:${m.color}"></span>${m.name} の診断結果</div>`;

      const color = r.rate >= 60 ? '#34d399' : r.rate >= 30 ? '#fbbf24' : '#f87171';

      </div>`;
    });
    html += `</div>`;

    // Bottleneck actions
    const bnKey = isLowVolume ? 'low_volume' : worst.key;
    const actions = ACTIONS[bnKey];
    if(actions){
      html += `<div class="action-card">
        <div class="action-title">${actions.icon} 最大のボトルネック: ${actions.title}</div>
        ${isLowVolume ? `<div style="font-size:.8rem;color:#f87171;margin-bottom:6px">応募数が${md.apply||0}件と少なく、母集団形成が最優先課題です</div>` :
          `<div style="font-size:.8rem;color:#fbbf24;margin-bottom:6px">${worst.label}の転換率: ${worst.rate.toFixed(1)}%</div>`}
        <ul class="action-list">`;
      actions.actions.forEach(a => {
        const impCls = a.impact==='high'?'impact-high':a.impact==='mid'?'impact-mid':'impact-low';
        const impLabel = a.impact==='high'?'効果 大':a.impact==='mid'?'効果 中':'効果 小';
        html += `<li>${a.text}<span class="action-impact ${impCls}">${impLabel}</span></li>`;
      });
      html += `</ul></div>`;
    }

    // Secondary bottleneck
    const secondary = rates.filter(r=>r.key!==worst.key&&r.rate<50).sort((a,b)=>a.rate-b.rate)[0];
    if(secondary && ACTIONS[secondary.key] && !isLowVolume){
      const sa = ACTIONS[secondary.key];
      html += `<div class="action-card" style="opacity:.8">
        <div class="action-title" style="font-size:.82rem">${sa.icon} 次の改善ポイント: ${sa.title}（${secondary.rate.toFixed(1)}%）</div>

      sa.actions.slice(0,3).forEach(a => {
        const impCls = a.impact==='high'?'impact-high':a.impact==='mid'?'impact-mid':'impact-low';
        html += `<li>${a.text}<span class="action-impact ${impCls}">${a.impact==='high'?'効果 大':a.impact==='mid'?'効果 中':'効果 小'}</span></li>`;
      });
      html += `</ul></div>`;
    }
    html += `</div>`;
  });

  // Cross-media summary
  html += `<div class="card fade-in"><div class="card-title">全媒体 共通ボトルネック</div>`;
  const convKeys = ['apply_valid','valid_interview','interview_sales_start','sales_start_hire'];
  const convLabels = ['応募→有効応募','有効応募→面接','面接→営業開始','営業開始→入社'];
  const fromTo = [['apply','valid'],['valid','interview'],['interview','sales_start'],['sales_start','hire']];

  const avgRates = convKeys.map((key,i) => {
    const rates = mediaList.map(m => {
      const md = d[m.id]||{};
      return md[fromTo[i][0]] ? md[fromTo[i][1]]/md[fromTo[i][0]]*100 : null;
    }).filter(r=>r!==null);
    return { key, label:convLabels[i], avg: rates.length?rates.reduce((a,b)=>a+b,0)/rates.length:null };
  }).filter(r=>r.avg!==null);

  if(avgRates.length){
    avgRates.sort((a,b)=>a.avg-b.avg);
    html += `<table class="media"><thead><tr><th>ステップ</th><th>全媒体平均</th><th>判定</th></tr></thead><tbody>`;
    avgRates.forEach(r=>{
      const color = r.avg>=60?'#34d399':r.avg>=30?'#fbbf24':'#f87171';
      const judge = r.avg>=60?'良好':r.avg>=30?'改善余地あり':'要改善';
      html += `<tr><td>${r.label}</td><td class="num" style="color:${color};font-weight:700">${r.avg.toFixed(1)}%</td><td style="color:${color}">${judge}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  document.getElementById('bottleneckArea').innerHTML = html;
}

function renderTrend(){

  let html = `<div class="card fade-in"><div class="card-title">月次推移</div>`;
  metrics.forEach(met => {

        let tc=0,td=0; mediaList.forEach(media=>{tc+=(md[media.id]?.cost||0);td+=(md[media.id]?.deal||0);}); return td?tc/td:0;
      }
      return mediaList.reduce((s,media)=>s+(md[media.id]?.[met.key]||0),0);
    });
    const mx = Math.max(...vals,1);
    vals.forEach((v,i) => {
      const h = Math.max((v/mx)*100,4);
      html += `<div style="flex:1;text-align:center"><div style="font-size:.6rem;color:${met.color};font-weight:700;margin-bottom:2px">${met.calc?yen(Math.round(v)):v}</div><div style="height:${h}%;background:${met.color};border-radius:4px 4px 0 0;margin:0 auto;width:70%"></div><div style="font-size:.55rem;color:#64748b;margin-top:4px">${months[i].slice(5)}月</div></div>`;

  });
  html += `</div>`;
  document.getElementById('trendArea').innerHTML = html;
}

function addSimMedia(templateKey){
  const t = MEDIA_TEMPLATES[templateKey];
  simNewMedia.push({
    id: 'sim_new_' + Date.now(),
    templateKey,
    name: t.name,
    color: t.color,
    budget: t.budget,
    estApply: t.estApply || 0,
    validRate: t.validRate,
    interviewRate: t.interviewRate,
    salesStartRate: t.salesStartRate,
    hireRate: t.hireRate,
    dealRate: t.dealRate,
    isApplyBased: true,
    note: t.note
  });
  renderSimNewMedia();
  updateSim();
}

function updSimNew(id, field, value){
  const nm = simNewMedia.find(m=>m.id===id);
  if(!nm) return;
  nm[field] = value;
  updateSim();
}

function calcNewMediaResult(nm){
  const applies = nm.estApply || 0;
  const valids = Math.round(applies * nm.validRate / 100);
  const interviews = Math.round(valids * nm.interviewRate / 100);
  const salesStarts = Math.round(interviews * nm.salesStartRate / 100);
  const hires = Math.round(salesStarts * nm.hireRate / 100);
  const deals = Math.round(hires * nm.dealRate / 100);
  const cpa = deals > 0 ? Math.round(nm.budget / deals) : null;
  return { applies, valids, interviews, salesStarts, hires, deals, cpa, budget: nm.budget };
}

function updateSim(){
  const rates = window._simRates; if(!rates) return;
  let totalCost=0, totalHire=0, totalDeal=0;
  let baseCost=0, baseHire=0, baseDeal=0;

  // Existing media
  mediaList.forEach(m => {
    const budget = parseInt(document.getElementById(`sim_${m.id}`)?.value)||0;
    const valEl = document.getElementById(`sim_${m.id}_val`);
    if(valEl) valEl.textContent = yen(budget)+'円';
    const r = rates[m.id];
    let hires=0, deals=0;
    if(r.costPerApply && budget>0){
      const applies = Math.floor(budget/r.costPerApply);
      const valids = Math.round(applies*r.validRate);
      const interviews = Math.round(valids*r.interviewRate);
      const salesStarts = Math.round(interviews*r.salesStartRate);
      hires = Math.round(salesStarts*r.hireRate);
      deals = Math.round(hires*r.dealRate);
    }
    totalCost+=budget; totalHire+=hires; totalDeal+=deals;
  });
  baseCost=totalCost; baseHire=totalHire; baseDeal=totalDeal;

  // New media
  simNewMedia.forEach(nm => {
    const r = calcNewMediaResult(nm);
    totalCost += r.budget;
    totalHire += r.hires;
    totalDeal += r.deals;
    // Update per-card summary
    const el = document.getElementById(`snm_result_${nm.id}`);
    if(el){
      el.innerHTML = `
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#38bdf8">${r.applies}</div><div class="sim-summary-label">応募</div></div>
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#818cf8">${r.valids}</div><div class="sim-summary-label">有効応募</div></div>
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#a78bfa">${r.interviews}</div><div class="sim-summary-label">面接</div></div>
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#fbbf24">${r.salesStarts}</div><div class="sim-summary-label">営業開始</div></div>
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#34d399">${r.hires}</div><div class="sim-summary-label">入社</div></div>
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#22c55e">${r.deals}</div><div class="sim-summary-label">成約</div></div>
        <div class="sim-summary-item"><div class="sim-summary-val" style="color:#f97316">${r.cpa!==null?yen(r.cpa)+'円':'N/A'}</div><div class="sim-summary-label">予測CPA</div></div>`;
    }
  });

  const cpa = totalHire?Math.round(totalCost/totalHire):0;
  const dcpa = totalDeal?Math.round(totalCost/totalDeal):0;
  const resultEl = document.getElementById('simResult');
  if(resultEl) resultEl.innerHTML = `
    <div class="sim-box"><div class="sim-val" style="color:#818cf8">${yen(totalCost)}円</div><div class="sim-label">総予算</div></div>
    <div class="sim-box"><div class="sim-val" style="color:#34d399">${totalHire}名</div><div class="sim-label">予測入社</div></div>
    <div class="sim-box"><div class="sim-val" style="color:#22c55e">${totalDeal}件</div><div class="sim-label">予測成約</div></div>
    <div class="sim-box"><div class="sim-val" style="color:#f97316">${cpa?yen(cpa)+'円':'N/A'}</div><div class="sim-label">入社CPA</div></div>
    <div class="sim-box"><div class="sim-val" style="color:#e879f9">${dcpa?yen(dcpa)+'円':'N/A'}</div><div class="sim-label">成約CPA</div></div>`;

  // Comparison vs base (existing only)
  const compEl = document.getElementById('simComparison');
  if(compEl && simNewMedia.length > 0){
    const newHire = totalHire - baseHire;
    const newDeal = totalDeal - baseDeal;
    const newCost = totalCost - baseCost;
    const baseCPA = baseHire ? Math.round(baseCost/baseHire) : null;
    const newCPA = cpa;
    const cpaDiff = (baseCPA && newCPA) ? newCPA - baseCPA : null;

    compEl.innerHTML = `<div style="font-size:.82rem;color:#94a3b8;margin-bottom:8px">新規媒体追加による変化:</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem">
        <div>入社: ${baseHire}名 → <strong style="color:#34d399">${totalHire}名</strong> <span class="compare-badge compare-up">+${newHire}名</span></div>
        <div>成約: ${baseDeal}件 → <strong style="color:#22c55e">${totalDeal}件</strong> <span class="compare-badge compare-up">+${newDeal}件</span></div>
        <div>予算: ${yen(baseCost)}円 → <strong>${yen(totalCost)}円</strong> <span class="compare-badge ${newCost>0?'compare-down':'compare-up'}">+${yen(newCost)}円</span></div>
        ${cpaDiff!==null ? `<div>CPA: ${yen(baseCPA)}円 → <strong>${yen(newCPA)}円</strong> <span class="compare-badge ${cpaDiff>0?'compare-down':'compare-up'}">${cpaDiff>0?'+':''}${yen(cpaDiff)}円</span></div>` : ''}
      </div>
      <div style="margin-top:10px;font-size:.78rem;color:#475569">※ 新規媒体の数値は想定値です。導入後1-2ヶ月の実績で転換率を更新し、精度を上げてください。</div>`;
  } else if(compEl){
    compEl.innerHTML = '';
  }
}

function applyPreset(type){
  const d = currentData;
  const totalBudget = mediaList.reduce((s,m)=>s+(d[m.id]?.cost||0),0);
  const cpas = {};
  mediaList.forEach(m => { cpas[m.id] = d[m.id]?.deal ? d[m.id].cost/d[m.id].deal : Infinity; });
  const sorted = Object.entries(cpas).sort((a,b)=>a[1]-b[1]);
  const bestK = sorted[0][0], worstK = sorted[sorted.length-1][0];
  const alloc = {}; mediaList.forEach(m=>alloc[m.id]=0);

  if(type==='equal'){
    const each = Math.round(totalBudget/mediaList.length/10000)*10000;
    mediaList.forEach(m=>alloc[m.id]=each);
  } else if(type==='best'){
    alloc[bestK] = Math.round(totalBudget*0.6/10000)*10000;
    const rest = mediaList.filter(m=>m.id!==bestK);
    rest.forEach(m=>alloc[m.id]=Math.round(totalBudget*0.4/rest.length/10000)*10000);
  } else if(type==='cut_worst'){
    alloc[worstK] = 0;
    const rest = mediaList.filter(m=>m.id!==worstK);
    rest.forEach(m=>alloc[m.id]=Math.round(totalBudget/rest.length/10000)*10000);
  } else if(type==='double'){
    mediaList.forEach(m=>alloc[m.id]=(d[m.id]?.cost||0)*2);
  }
  mediaList.forEach(m=>{ const el=document.getElementById(`sim_${m.id}`); if(el) el.value=alloc[m.id]; });
  updateSim();
}

    <p style="font-size:.82rem;color:#94a3b8;margin-bottom:14px">採用PLを改善するための具体的な施策を優先度順に整理します。</p>`;

    {

      color: '#f87171',
      impact: 'high',
      desc: '営業開始→入社が4%の最大要因は「営業が案件を決めきれない」こと。54名が営業開始→成約11件→入社2名。営業キャパ・提案スピード・案件ストックの3点がボトルネック。',
      items: [
        '【営業キャパの確保】現営業1-2名で月18名の案件提案は物理的に限界。営業増員 or 案件提案の仕組み化（テンプレ提案書+一括送信）が急務',
        '【提案スピード】営業開始→クライアント提案を48時間以内にルール化。候補者は並行で他社も受けているため、スピード=勝率',
        '【案件ストックの常時確保】営業開始時に即提案できる案件プールを30件以上確保。「案件待ち」による候補者離脱が最大のロス',
        '【スキルシート品質】クライアント面談に進めるかはスキルシートで8割決まる。面接と並行でスキルシート完成→営業が即提案できる状態を作る',
        '【クライアント面談通過率UP】候補者に面談前の想定QA・ポイントを事前共有。「知ってれば答えられた」で落ちるのを防ぐ',
        '【取引先の新規開拓】案件マッチングの選択肢を増やすには取引先の数がものを言う。営業の新規開拓KPIも並行で設定'
      ]
    },
    {
      title: '2. 候補者の離脱防止（営業開始〜入社の間）',
      color: '#fb923c',
      impact: 'high',
      desc: '営業開始しても案件が決まるまでに時間がかかると、候補者は他社に流れる。待機期間のマネジメントが入社率を左右する。',
      items: [
        '【期待値の事前設定】面接時に「案件決定まで平均○週間」を伝え、途中辞退を防止',
        '【週次フォロー】営業開始後、週1回の進捗共有を候補者に実施（「今○件提案中です」）。放置感を絶対に出さない',
        '【並行提案の徹底】1候補者に対し最低3件以上の案件を同時提案。1件ずつ順番に提案すると時間がかかりすぎる',
        '【条件の柔軟調整】候補者の希望条件が厳しい場合、営業と採用で連携して「ここを妥協すればこの案件がある」と具体的に提案',
        '【辞退理由の収集と改善】営業開始後に辞退した候補者全員にヒアリング。「案件が合わなかった」「他社で決まった」「待ちすぎた」を分類してPDCA',
        '【社会福祉士の活用】待機中の不安やメンタル面のサポート。他社にない独自価値として候補者に安心感を与える'
      ]
    },
    {
      title: '3. 採用→営業の連携プロセス整備',
      color: '#a78bfa',
      impact: 'high',
      desc: '採用部と営業部の情報共有が遅れると、すべてが後手に回る。「面接通過の翌日には営業が動いている」状態を作る。',
      items: [
        '【面接と営業の同時進行】面接段階から営業チームに候補者情報を共有。面接通過→即日スキルシート完成→翌日案件提案の流れを構築',
        '【共有テンプレ】Slack/Notionで「候補者カード」を定型化。スキル・希望条件・NG条件・想定単価を1枚にまとめ、営業が即判断できるように',
        '【週次の採用×営業ミーティング】候補者パイプラインと案件パイプラインを突き合わせ。「この人にはこの案件が合いそう」を事前に擦り合わせる',
        '【KPIの連動】採用のKPI（営業開始数）と営業のKPI（案件成約数）を連動させ、両部署が同じゴールに向かう仕組みに'
      ]
    },
    {
      title: '4. 有効応募率の改善',
      color: '#fbbf24',
      impact: 'mid',
      desc: '応募の質を高め、採用チームの工数対効果を最大化する。',
      items: [
        'スカウト送信ターゲットの精度UP（経験年数・スキルでフィルタ強化）',
        '求人原稿の訴求ポイント見直し（競合分析で判明した強みを反映）',
        '応募フォームに簡易スクリーニング項目を追加（Google Sheets管理データの有効応募基準①〜④を反映）',
        'フルリモート希望者の対応方針を明確化（実績データでは「フルリモート希望」が辞退の主因の一つ）'
      ]
    },
    {
      title: '5. 媒体配分の最適化 + 新規チャネル',
      color: '#38bdf8',
      impact: 'mid',
      desc: 'CPA実績ベースで予算を再配分し、同予算でより多くの採用を実現する。',
      items: [
        'CPA実績が良い媒体に予算を集中配分（成約ベースでの媒体別CPA比較）',
        'HP/Indeed（低コスト）チャネルの強化・SEO対策',
        'リファラル制度の立ち上げ（CPA実質0円、転換率が最も高いチャネル）',
        'Wantedly / Green 等のエンジニア特化媒体の追加検討',
        'SNS / コンテンツ（note, Qiita, X）での認知拡大'
      ]
    }
  ];

  actions.forEach(a=>{
    const impCls = a.impact==='high'?'impact-high':a.impact==='mid'?'impact-mid':'impact-low';
    const impLabel = a.impact==='high'?'最重要':a.impact==='mid'?'重要':'推奨';
    html += `<div class="action-card">
      <div class="action-title" style="color:${a.color}">${a.title} <span class="action-impact ${impCls}">${impLabel}</span></div>
      <div style="font-size:.78rem;color:#94a3b8;margin-bottom:8px">${a.desc}</div>
      <ul class="action-list">`;
    a.items.forEach(item=>{
      html += `<li>${item}</li>`;
    });
    html += `</ul></div>`;
  });

  html += `</div>`;

  document.getElementById('simPLArea').innerHTML = html;
  updateSimPL();
}

function updateSimPL(){
  const target = parseInt(document.getElementById('spl_target')?.value)||20;
  const cpaTgt = parseInt(document.getElementById('spl_cpa')?.value)||200000;
  const r1 = parseInt(document.getElementById('spl_r1')?.value)||28;
  const r2 = parseInt(document.getElementById('spl_r2')?.value)||49;
  const r3 = parseInt(document.getElementById('spl_r3')?.value)||78;
  const r4 = parseInt(document.getElementById('spl_r4')?.value)||4;

  // Update display values
  const s=id=>document.getElementById(id);
  if(s('spl_target_v')) s('spl_target_v').textContent=target+'名';
  if(s('spl_cpa_v')) s('spl_cpa_v').textContent=yen(cpaTgt)+'円';
  if(s('spl_r1_v')) s('spl_r1_v').textContent=r1+'%';
  if(s('spl_r2_v')) s('spl_r2_v').textContent=r2+'%';
  if(s('spl_r3_v')) s('spl_r3_v').textContent=r3+'%';
  if(s('spl_r4_v')) s('spl_r4_v').textContent=r4+'%';

  // Reverse calculate
  const needSalesStart = Math.ceil(target/(r4/100));
  const needInterview = Math.ceil(needSalesStart/(r3/100));
  const needValid = Math.ceil(needInterview/(r2/100));
  const needApply = Math.ceil(needValid/(r1/100));
  const totalBudget = target * cpaTgt;
  const monthlyApply = Math.ceil(needApply/6);
  const monthlyBudget = Math.round(totalBudget/6);

  // Actual aggregate cost per apply
  let totApply=0,totCost=0;
  Object.values(allData).forEach(md=>{
    mediaList.forEach(m=>{
      if(!md[m.id]) return;
      totApply+=(md[m.id].apply||0);
      totCost+=(md[m.id].cost||0);
    });
  });
  const costPerApply = totApply>0?Math.round(totCost/totApply):10000;
  const requiredBudgetActual = needApply * costPerApply;

  const calcEl = document.getElementById('spl_calc');
  if(calcEl){
    let ch = `<div style="background:#0f172a;border-radius:10px;padding:16px">
      <div style="font-size:.9rem;font-weight:700;margin-bottom:12px;color:#6366f1">逆算結果</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.85rem;margin-bottom:12px">
        <div style="background:#34d399;color:#000;padding:6px 14px;border-radius:6px;font-weight:700">入社 ${target}名</div>
        <span style="color:#475569">← 必要</span>
        <div style="background:#fbbf24;color:#000;padding:6px 14px;border-radius:6px;font-weight:700">営業開始 ${needSalesStart.toLocaleString()}名</div>
        <span style="color:#475569">←</span>
        <div style="background:#a78bfa;color:#000;padding:6px 14px;border-radius:6px;font-weight:700">面接 ${needInterview.toLocaleString()}名</div>
        <span style="color:#475569">←</span>
        <div style="background:#818cf8;color:#000;padding:6px 14px;border-radius:6px;font-weight:700">有効応募 ${needValid.toLocaleString()}名</div>
        <span style="color:#475569">←</span>
        <div style="background:#38bdf8;color:#000;padding:6px 14px;border-radius:6px;font-weight:700">応募 ${needApply.toLocaleString()}名</div>
      </div>
      <div class="sim-result">
        <div class="sim-box"><div class="sim-val" style="color:#6366f1">${target}名</div><div class="sim-label">採用目標</div></div>
        <div class="sim-box"><div class="sim-val" style="color:#38bdf8">${needApply.toLocaleString()}</div><div class="sim-label">必要応募数（総計）</div></div>
        <div class="sim-box"><div class="sim-val" style="color:#a78bfa">${monthlyApply.toLocaleString()}</div><div class="sim-label">月間必要応募数</div></div>
        <div class="sim-box"><div class="sim-val" style="color:#f59e0b">${yen(totalBudget)}円</div><div class="sim-label">目標CPA時の総予算</div></div>
        <div class="sim-box"><div class="sim-val" style="color:#fb923c">${yen(monthlyBudget)}円</div><div class="sim-label">月間媒体予算</div></div>
        <div class="sim-box"><div class="sim-val" style="color:#f87171">${yen(requiredBudgetActual)}円</div><div class="sim-label">実績単価での必要総予算</div></div>
      </div>`;

    if(requiredBudgetActual > totalBudget * 3){
      ch += `<div class="insight insight-warn" style="margin-top:12px"><strong>現状の転換率では、目標CPA ${yen(cpaTgt)}円での${target}名採用は困難です。</strong> 実績ベースの応募単価(${yen(costPerApply)}円/件)で${needApply.toLocaleString()}件の応募を集めるには ${yen(requiredBudgetActual)}円が必要で、目標予算の${(requiredBudgetActual/totalBudget).toFixed(1)}倍です。転換率の改善が不可欠です。</div>`;
    } else {
      ch += `<div class="insight insight-good" style="margin-top:12px"><strong>この転換率であれば、目標は達成可能な範囲です。</strong></div>`;
    }
    ch += `</div>`;
    calcEl.innerHTML = ch;
  }

  // ===== Scenarios =====
  const scenEl = document.getElementById('spl_scenarios');
  if(scenEl){
    const scenarios = [
      {
        name: 'Scenario A: 現状維持',
        color: '#f87171',
        icon: '&#10060;',
        r1: r1, r2: r2, r3: r3, r4: r4,
        desc: '現在の転換率を維持した場合。改善施策なし。',
        budgetMult: 1
      },
      {
        name: 'Scenario B: 歩留まり改善',
        color: '#fbbf24',
        icon: '&#9889;',
        r1: Math.min(r1+12,60), r2: r2, r3: r3, r4: Math.min(Math.max(r4*7,30),40),
        desc: '営業開始→入社を30%に改善 + 有効応募率を'+Math.min(r1+12,60)+'%に引き上げ。',
        budgetMult: 1
      },
      {
        name: 'Scenario C: 歩留まり改善+媒体最適化',
        color: '#34d399',
        icon: '&#127775;',
        r1: Math.min(r1+12,60), r2: Math.min(r2+10,65), r3: r3, r4: Math.min(Math.max(r4*7,30),40),
        desc: '歩留まり改善 + 媒体最適化 + リファラル追加。CPA200K達成を目指す。',
        budgetMult: 0.7
      }
    ];

    let sh = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px">`;
    scenarios.forEach(sc=>{
      const scSalesStart = Math.ceil(target/(sc.r4/100));
      const scInterview = Math.ceil(scSalesStart/(sc.r3/100));
      const scValid = Math.ceil(scInterview/(sc.r2/100));
      const scApply = Math.ceil(scValid/(sc.r1/100));
      const scBudget = Math.round(scApply * costPerApply * sc.budgetMult);
      const scCPA = target>0?Math.round(scBudget/target):0;
      const scMonthly = Math.ceil(scApply/6);
      const scMonthBudget = Math.round(scBudget/6);
      const feasible = scCPA <= cpaTgt * 1.5;
      const timeline = Math.ceil(scApply / Math.max(monthlyApply,1));

      sh += `<div style="background:#0f172a;border:2px solid ${sc.color};border-radius:12px;padding:16px">
        <div style="font-size:.92rem;font-weight:700;color:${sc.color};margin-bottom:6px">${sc.icon} ${sc.name}</div>
        <div style="font-size:.78rem;color:#94a3b8;margin-bottom:12px">${sc.desc}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          <div style="text-align:center;background:#0a0e1a;padding:8px;border-radius:6px">
            <div style="font-size:.65rem;color:#64748b">応募→有効応募</div>
            <div style="font-size:.95rem;font-weight:800;color:${sc.r1>r1?'#34d399':'#e2e8f0'}">${sc.r1}%</div>
          </div>
          <div style="text-align:center;background:#0a0e1a;padding:8px;border-radius:6px">
            <div style="font-size:.65rem;color:#64748b">有効応募→面接</div>
            <div style="font-size:.95rem;font-weight:800;color:${sc.r2>r2?'#34d399':'#e2e8f0'}">${sc.r2}%</div>
          </div>
          <div style="text-align:center;background:#0a0e1a;padding:8px;border-radius:6px">
            <div style="font-size:.65rem;color:#64748b">面接→営業開始</div>
            <div style="font-size:.95rem;font-weight:800;color:#e2e8f0">${sc.r3}%</div>
          </div>
          <div style="text-align:center;background:#0a0e1a;padding:8px;border-radius:6px">
            <div style="font-size:.65rem;color:#64748b">営業開始→入社</div>
            <div style="font-size:.95rem;font-weight:800;color:${sc.r4>r4?'#34d399':'#f87171'}">${sc.r4}%</div>
          </div>
        </div>
        <div style="border-top:1px solid #1e293b;padding-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.78rem">
          <div>必要応募数: <strong>${scApply.toLocaleString()}件</strong></div>
          <div>月間応募: <strong>${scMonthly.toLocaleString()}件/月</strong></div>
          <div>総予算: <strong style="color:${sc.color}">${yen(scBudget)}円</strong></div>
          <div>月間予算: <strong>${yen(scMonthBudget)}円/月</strong></div>
          <div>予測CPA: <strong style="color:${scCPA<=cpaTgt?'#34d399':'#f87171'}">${yen(scCPA)}円</strong></div>
          <div>達成期間: <strong>約${Math.max(timeline,1)}ヶ月</strong></div>
        </div>
        <div style="margin-top:8px;padding:6px 10px;border-radius:6px;font-size:.78rem;font-weight:600;text-align:center;background:${feasible?'#064e3b':'#450a0a'};color:${feasible?'#34d399':'#f87171'}">${feasible?'達成可能':'達成困難 - さらなる改善が必要'}</div>
      </div>`;
    });
    sh += `</div>`;
    scenEl.innerHTML = sh;
  }

  // ===== ROI =====
  const roiEl = document.getElementById('spl_roi');
  if(roiEl){
    const revPerEng = ENG_REVENUE;     // 600,000
    const marginRate = ENG_MARGIN_RATE; // 0.17
    const marginPerEng = ENG_MARGIN;    // ~102,000
    const totalRecruit = target * cpaTgt;
    const monthlyRevAdd = target * revPerEng;
    const monthlyMarginAdd = target * marginPerEng;
    const payback = monthlyMarginAdd>0?Math.ceil(totalRecruit/monthlyMarginAdd):99;

    let rh = `<div class="sim-result" style="margin-bottom:16px">
      <div class="sim-box"><div class="sim-val" style="color:#6366f1">${target}名</div><div class="sim-label">追加エンジニア</div></div>
      <div class="sim-box"><div class="sim-val" style="color:#38bdf8">${yen(monthlyRevAdd)}円</div><div class="sim-label">追加月間売上</div></div>
      <div class="sim-box"><div class="sim-val" style="color:#34d399">${yen(monthlyMarginAdd)}円</div><div class="sim-label">追加月間粗利</div></div>
      <div class="sim-box"><div class="sim-val" style="color:#f59e0b">${yen(totalRecruit)}円</div><div class="sim-label">採用総コスト</div></div>
      <div class="sim-box"><div class="sim-val" style="color:#e879f9">${payback}ヶ月</div><div class="sim-label">投資回収期間</div></div>
    </div>`;

    // 12-month cumulative profit chart
    rh += `<div style="font-size:.85rem;font-weight:700;margin-bottom:8px;color:#22c55e">12ヶ月間累計利益シミュレーション</div>
      <div style="font-size:.75rem;color:#64748b;margin-bottom:10px">前提: エンジニア1名あたり月間売上${yen(revPerEng)}円、粗利率${(marginRate*100).toFixed(0)}%（粗利${yen(marginPerEng)}円/名/月）</div>`;

    rh += `<div style="display:flex;gap:2px;align-items:flex-end;height:160px;padding-bottom:24px;position:relative">`;
    const monthLabels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    let cumProfit = -totalRecruit;
    const profits = [];
    for(let i=0;i<12;i++){
      cumProfit += monthlyMarginAdd;
      profits.push(cumProfit);
    }
    const maxAbs = Math.max(...profits.map(p=>Math.abs(p)),1);

    profits.forEach((p,i)=>{
      const isPositive = p >= 0;
      const h = Math.max(Math.abs(p)/maxAbs*120, 4);
      rh += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
        <div style="font-size:.6rem;font-weight:700;color:${isPositive?'#34d399':'#f87171'};margin-bottom:2px">${yen(Math.round(p))}円</div>
        <div style="width:70%;height:${h}px;background:${isPositive?'#22c55e':'#ef4444'};border-radius:4px 4px 0 0;opacity:${isPositive?1:0.6}"></div>
        <div style="font-size:.55rem;color:#64748b;margin-top:4px">${monthLabels[i]}</div>
      </div>`;
    });
    rh += `</div>`;

    rh += `<div class="insight insight-good" style="margin-top:10px"><strong>投資回収: ${payback}ヶ月目に黒字転換。</strong> 12ヶ月後の累計利益は <strong>${yen(Math.round(profits[11]))}円</strong>。採用投資${yen(totalRecruit)}円に対し、<strong>ROI ${((profits[11]/totalRecruit)*100).toFixed(0)}%</strong>。</div>`;

    // Additional PL detail
    rh += `<div style="margin-top:14px;background:#0f172a;border-radius:10px;padding:14px">
      <div style="font-size:.85rem;font-weight:700;margin-bottom:8px;color:#a78bfa">月次PLインパクト詳細</div>
      <table class="media"><thead><tr><th>項目</th><th>現状（${CURRENT_ENG}名）</th><th>目標後（${CURRENT_ENG+target}名）</th><th>差分</th></tr></thead><tbody>
        <tr><td>月間売上</td><td class="num">${yen(CURRENT_ENG*revPerEng)}円</td><td class="num" style="color:#34d399;font-weight:700">${yen((CURRENT_ENG+target)*revPerEng)}円</td><td class="num" style="color:#34d399">+${yen(target*revPerEng)}円</td></tr>
        <tr><td>月間粗利</td><td class="num">${yen(Math.round(CURRENT_ENG*marginPerEng))}円</td><td class="num" style="color:#34d399;font-weight:700">${yen(Math.round((CURRENT_ENG+target)*marginPerEng))}円</td><td class="num" style="color:#34d399">+${yen(target*marginPerEng)}円</td></tr>
        <tr><td>内勤人件費</td><td class="num">${yen(INTERNAL_COST)}円</td><td class="num">${yen(INTERNAL_COST)}円</td><td class="num" style="color:#94a3b8">±0</td></tr>
        <tr><td>融資返済</td><td class="num">${yen(LOAN_PAYMENT)}円</td><td class="num">${yen(LOAN_PAYMENT)}円</td><td class="num" style="color:#94a3b8">±0</td></tr>
        <tr><td>媒体費（月額）</td><td class="num">${yen(MONTHLY_MEDIA)}円</td><td class="num">${yen(Math.round(totalRecruit/6))}円</td><td class="num" style="color:${Math.round(totalRecruit/6)>MONTHLY_MEDIA?'#f87171':'#34d399'}">${Math.round(totalRecruit/6)>MONTHLY_MEDIA?'+':''}${yen(Math.round(totalRecruit/6)-MONTHLY_MEDIA)}円</td></tr>
        <tr style="border-top:2px solid #334155"><td style="font-weight:700">営業利益</td><td class="num" style="font-weight:700">${yen(CURRENT_ENG*marginPerEng-INTERNAL_COST-LOAN_PAYMENT-MONTHLY_MEDIA)}円</td><td class="num" style="font-weight:700;color:#34d399">${yen((CURRENT_ENG+target)*marginPerEng-INTERNAL_COST-LOAN_PAYMENT-Math.round(totalRecruit/6))}円</td><td class="num" style="font-weight:700;color:#34d399">+${yen(target*marginPerEng-(Math.round(totalRecruit/6)-MONTHLY_MEDIA))}円</td></tr>
      </tbody></table>
    </div>`;

    roiEl.innerHTML = rh;
  }
}

function showTab(id){
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.remove('active');
    var oc = t.getAttribute('onclick');
    if(oc && oc.indexOf("'" + id + "'") !== -1) t.classList.add('active');
  });
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('sec-'+id).classList.add('active');
}

// Init
renderInput();
renderCompetitor();
renderSimPL();
</script>
